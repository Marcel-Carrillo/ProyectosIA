openapi: 3.0.0
info:
  title: Women's Fashion Ecommerce API
  description: |
    REST API for the women's fashion ecommerce platform, designed for managing products, categories, suppliers, customer orders, supplier orders, shipments, returns, and refunds.

    This API follows Domain-Driven Design principles and implements a layered architecture for scalable ecommerce and supplier-fulfilled order management.

    ## Features
    - Product catalog management with categories, variants, prices, images, and supplier references
    - Supplier management for external fulfillment workflows
    - Customer management with addresses and order history
    - Customer order management with payment and fulfillment status tracking
    - Supplier order management for background supplier-fulfilled ecommerce
    - Shipment tracking for supplier or store-managed deliveries
    - Return request and refund management
    - Comprehensive filtering, sorting, and pagination support

    ## Business Model
    The initial business model is supplier-fulfilled ecommerce:
    - The store does not manage its own warehouse at the beginning.
    - Customers place orders through the online store.
    - Store administrators process supplier orders in the background.
    - Suppliers may ship products directly to customers.
    - The system must support future evolution to internal stock, hybrid fulfillment, multiple suppliers, and supplier automation.

  version: 0.0.0.001
  contact:
    name: Ecommerce Development Team
  license:
    name: ISC

servers:
  - url: http://localhost:3000
    description: Development server
  - url: https://api.ecommerce.dev
    description: Production server

paths:
  /categories:
    get:
      summary: Get all categories
      description: Retrieve all product categories
      tags:
        - Categories
      parameters:
        - in: query
          name: includeInactive
          schema:
            type: boolean
            default: false
          description: When true, includes inactive (soft-deleted) categories in the response
      responses:
        '200':
          description: Successfully retrieved categories
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CategoryListResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '500':
          $ref: '#/components/responses/InternalServerError'

    post:
      summary: Create a new category
      description: Create a new product category
      tags:
        - Categories
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateCategoryRequest'
      responses:
        '201':
          description: Category created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CategoryResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '409':
          $ref: '#/components/responses/Conflict'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /categories/{id}:
    get:
      summary: Get category by ID
      description: Retrieve a specific category by ID
      tags:
        - Categories
      parameters:
        - $ref: '#/components/parameters/IdPathParam'
      responses:
        '200':
          description: Successfully retrieved category
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CategoryResponse'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

    put:
      summary: Update category
      description: Update an existing category
      tags:
        - Categories
      parameters:
        - $ref: '#/components/parameters/IdPathParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateCategoryRequest'
      responses:
        '200':
          description: Category updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CategoryResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
        '500':
          $ref: '#/components/responses/InternalServerError'

    delete:
      summary: Soft-delete category
      description: Soft-delete a category by setting its status to Inactive (row is not removed from the database)
      tags:
        - Categories
      parameters:
        - $ref: '#/components/parameters/IdPathParam'
      responses:
        '200':
          description: Category soft-deleted successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CategoryResponse'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /products:
    get:
      summary: Get all products
      description: Retrieve a paginated list of products with optional filtering and sorting
      tags:
        - Products
      parameters:
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/LimitParam'
        - in: query
          name: search
          schema:
            type: string
          description: Search term to filter products by name, slug, brand, or description
        - in: query
          name: categoryId
          schema:
            type: integer
          description: Filter products by category ID
        - in: query
          name: status
          schema:
            $ref: '#/components/schemas/ProductStatus'
          description: Filter products by status
        - in: query
          name: sort
          schema:
            type: string
            enum: [name, slug, brand, createdAt, updatedAt]
            default: createdAt
          description: Field to sort products by
        - in: query
          name: order
          schema:
            type: string
            enum: [asc, desc]
            default: desc
          description: Sort order
      responses:
        '200':
          description: Successfully retrieved products
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProductListResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '500':
          $ref: '#/components/responses/InternalServerError'

    post:
      summary: Create a new product
      description: Create a new product with optional variants and images
      tags:
        - Products
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateProductRequest'
      responses:
        '201':
          description: Product created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProductResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '409':
          $ref: '#/components/responses/Conflict'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /products/{id}:
    get:
      summary: Get product by ID
      description: Retrieve detailed information about a specific product, including variants and images
      tags:
        - Products
      parameters:
        - $ref: '#/components/parameters/IdPathParam'
      responses:
        '200':
          description: Successfully retrieved product
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProductResponse'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

    put:
      summary: Update product
      description: Update an existing product
      tags:
        - Products
      parameters:
        - $ref: '#/components/parameters/IdPathParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateProductRequest'
      responses:
        '200':
          description: Product updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProductResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
        '500':
          $ref: '#/components/responses/InternalServerError'

    delete:
      summary: Delete product
      description: Delete an existing product
      tags:
        - Products
      parameters:
        - $ref: '#/components/parameters/IdPathParam'
      responses:
        '204':
          description: Product deleted successfully
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/admin/products:
    get:
      summary: List products (admin)
      description: Returns a paginated list of non-deleted products with optional filtering.
      tags:
        - Admin — Products
      parameters:
        - in: query
          name: status
          schema:
            $ref: '#/components/schemas/ProductStatus'
        - in: query
          name: categoryId
          schema:
            type: integer
        - in: query
          name: search
          schema:
            type: string
        - in: query
          name: page
          schema:
            type: integer
            default: 1
        - in: query
          name: pageSize
          schema:
            type: integer
            default: 20
      responses:
        '200':
          description: Products retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProductListResponse'
        '500':
          $ref: '#/components/responses/InternalServerError'

    post:
      summary: Create product (admin)
      description: Creates a new product. Slug is auto-generated from name in kebab-case. Default status is Draft.
      tags:
        - Admin — Products
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateProductRequest'
      responses:
        '201':
          description: Product created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProductResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '409':
          description: Slug conflict after 5 auto-retry attempts (PRODUCT_SLUG_CONFLICT)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/admin/products/{id}:
    get:
      summary: Get product by ID (admin)
      tags:
        - Admin — Products
      parameters:
        - $ref: '#/components/parameters/IdPathParam'
      responses:
        '200':
          description: Product with variants and images
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProductResponse'
        '404':
          description: Product not found (PRODUCT_NOT_FOUND)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          $ref: '#/components/responses/InternalServerError'

    patch:
      summary: Update product (admin)
      description: Partial update. To activate, product must have ≥1 active variant. Archived products cannot be reactivated.
      tags:
        - Admin — Products
      parameters:
        - $ref: '#/components/parameters/IdPathParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateProductRequest'
      responses:
        '200':
          description: Product updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProductResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          description: Product not found (PRODUCT_NOT_FOUND)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '422':
          description: |
            Business rule violation:
            - PRODUCT_REQUIRES_ACTIVE_VARIANT: activating product with no active variants
            - PRODUCT_ARCHIVED_CANNOT_REACTIVATE: attempting to reactivate an archived product
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          $ref: '#/components/responses/InternalServerError'

    delete:
      summary: Soft-delete product (admin)
      description: Sets deletedAt timestamp. Product is excluded from all subsequent queries.
      tags:
        - Admin — Products
      parameters:
        - $ref: '#/components/parameters/IdPathParam'
      responses:
        '204':
          description: Product soft-deleted
        '404':
          description: Product not found (PRODUCT_NOT_FOUND)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/admin/products/{id}/variants:
    get:
      summary: List variants for product (admin)
      description: Returns all non-deleted variants. supplierId, supplierReference, and supplierCost are NEVER included in responses.
      tags:
        - Admin — Product Variants
      parameters:
        - $ref: '#/components/parameters/IdPathParam'
      responses:
        '200':
          description: Variants retrieved successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/ProductVariant'
                  message:
                    type: string
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

    post:
      summary: Create variant (admin)
      description: >
        Creates a new variant for the product. compareAtPrice must be strictly greater than
        publicPrice if provided. supplierId/supplierReference/supplierCost are accepted as
        input but never returned in the response.
      tags:
        - Admin — Product Variants
      parameters:
        - $ref: '#/components/parameters/IdPathParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateProductVariantRequest'
      responses:
        '201':
          description: Variant created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    $ref: '#/components/schemas/ProductVariant'
                  message:
                    type: string
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          description: Product not found (PRODUCT_NOT_FOUND)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: SKU already exists (VARIANT_SKU_CONFLICT)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '422':
          description: compareAtPrice is not greater than publicPrice (VARIANT_COMPARE_PRICE_INVALID)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/admin/products/{id}/variants/{variantId}:
    get:
      summary: Get variant by ID (admin)
      tags:
        - Admin — Product Variants
      parameters:
        - $ref: '#/components/parameters/IdPathParam'
        - in: path
          name: variantId
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Variant retrieved
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    $ref: '#/components/schemas/ProductVariant'
                  message:
                    type: string
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

    patch:
      summary: Update variant (admin)
      tags:
        - Admin — Product Variants
      parameters:
        - $ref: '#/components/parameters/IdPathParam'
        - in: path
          name: variantId
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateProductVariantRequest'
      responses:
        '200':
          description: Variant updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    $ref: '#/components/schemas/ProductVariant'
                  message:
                    type: string
        '404':
          $ref: '#/components/responses/NotFound'
        '422':
          description: compareAtPrice validation error (VARIANT_COMPARE_PRICE_INVALID)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          $ref: '#/components/responses/InternalServerError'

    delete:
      summary: Soft-delete variant (admin)
      tags:
        - Admin — Product Variants
      parameters:
        - $ref: '#/components/parameters/IdPathParam'
        - in: path
          name: variantId
          required: true
          schema:
            type: integer
      responses:
        '204':
          description: Variant soft-deleted
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/admin/products/{id}/images:
    get:
      summary: List images for product (admin)
      tags:
        - Admin — Product Images
      parameters:
        - $ref: '#/components/parameters/IdPathParam'
      responses:
        '200':
          description: Images retrieved ordered by sortOrder
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/ProductImage'
                  message:
                    type: string
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

    post:
      summary: Add image to product (admin)
      tags:
        - Admin — Product Images
      parameters:
        - $ref: '#/components/parameters/IdPathParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateProductImageRequest'
      responses:
        '201':
          description: Image added
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    $ref: '#/components/schemas/ProductImage'
                  message:
                    type: string
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/admin/products/{id}/images/{imageId}:
    patch:
      summary: Update image (admin)
      tags:
        - Admin — Product Images
      parameters:
        - $ref: '#/components/parameters/IdPathParam'
        - in: path
          name: imageId
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateProductImageRequest'
      responses:
        '200':
          description: Image updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    $ref: '#/components/schemas/ProductImage'
                  message:
                    type: string
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

    delete:
      summary: Hard-delete image (admin)
      description: Permanently removes the image row (hard-delete, no deletedAt).
      tags:
        - Admin — Product Images
      parameters:
        - $ref: '#/components/parameters/IdPathParam'
        - in: path
          name: imageId
          required: true
          schema:
            type: integer
      responses:
        '204':
          description: Image deleted
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/admin/suppliers:
    get:
      summary: List suppliers (admin)
      description: >
        Returns a paginated list of suppliers with optional search (case-insensitive
        name match) and status filter. Admin-only; no `/api/public/suppliers` route exists.
      tags:
        - Admin — Suppliers
      parameters:
        - in: query
          name: search
          schema:
            type: string
          description: Case-insensitive filter on supplier name
        - in: query
          name: status
          schema:
            $ref: '#/components/schemas/SupplierStatus'
        - in: query
          name: page
          schema:
            type: integer
            default: 1
        - in: query
          name: pageSize
          description: Number of items per page. Clamped to a maximum of 100.
          schema:
            type: integer
            default: 20
            maximum: 100
      responses:
        '200':
          description: Suppliers retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SupplierListResponse'
        '500':
          $ref: '#/components/responses/InternalServerError'

    post:
      summary: Create supplier (admin)
      description: Creates a new supplier. Default status is Active when omitted.
      tags:
        - Admin — Suppliers
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateSupplierRequest'
      responses:
        '201':
          description: Supplier created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SupplierResponse'
        '400':
          description: Validation error (VALIDATION_ERROR)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/admin/suppliers/{id}:
    get:
      summary: Get supplier by ID (admin)
      tags:
        - Admin — Suppliers
      parameters:
        - $ref: '#/components/parameters/IdPathParam'
      responses:
        '200':
          description: Supplier retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SupplierResponse'
        '400':
          description: Invalid id parameter (VALIDATION_ERROR)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Supplier not found (SUPPLIER_NOT_FOUND)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          $ref: '#/components/responses/InternalServerError'

    patch:
      summary: Update supplier (admin)
      description: Partial update including status transitions (Active, Inactive, Blocked).
      tags:
        - Admin — Suppliers
      parameters:
        - $ref: '#/components/parameters/IdPathParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateSupplierRequest'
      responses:
        '200':
          description: Supplier updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SupplierResponse'
        '400':
          description: Validation error (VALIDATION_ERROR)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Supplier not found (SUPPLIER_NOT_FOUND)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          $ref: '#/components/responses/InternalServerError'

    delete:
      summary: Soft-delete supplier (admin)
      description: >
        Sets status to Inactive. The supplier row is preserved (no hard-delete).
        Returns 200 with the updated supplier, not 204.
      tags:
        - Admin — Suppliers
      parameters:
        - $ref: '#/components/parameters/IdPathParam'
      responses:
        '200':
          description: Supplier deactivated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SupplierResponse'
        '400':
          description: Invalid id parameter (VALIDATION_ERROR)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Supplier not found (SUPPLIER_NOT_FOUND)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/public/products:
    get:
      summary: List products (public storefront)
      description: >
        Customer-facing product listing for the storefront. Results are always
        restricted to Active products (any client-supplied `status` is ignored).
        Responses are serialized with a customer-safe allow-list and NEVER include
        supplier data (`supplierId`, `supplierReference`, `supplierCost`),
        `deletedAt`, or internal notes. Only Active variants are returned.
      tags:
        - Public — Catalog
      parameters:
        - in: query
          name: categoryId
          schema:
            type: integer
        - in: query
          name: search
          schema:
            type: string
        - in: query
          name: page
          schema:
            type: integer
            default: 1
        - in: query
          name: pageSize
          description: Number of items per page. Clamped to a maximum of 100.
          schema:
            type: integer
            default: 20
            maximum: 100
        - in: query
          name: sort
          schema:
            type: string
            enum: [name, createdAt]
        - in: query
          name: order
          schema:
            type: string
            enum: [asc, desc]
      responses:
        '200':
          description: Products retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PublicProductListResponse'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/public/products/{id}:
    get:
      summary: Get product by ID (public storefront)
      description: >
        Returns a single Active product with its Active variants and images
        ordered by sortOrder, serialized with the customer-safe allow-list.
        Non-existent or non-Active products return 404.
      tags:
        - Public — Catalog
      parameters:
        - $ref: '#/components/parameters/IdPathParam'
      responses:
        '200':
          description: Product retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PublicProductResponse'
        '404':
          description: Product not found or not Active (PRODUCT_NOT_FOUND)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          $ref: '#/components/responses/InternalServerError'

