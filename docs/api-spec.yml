components:
  parameters:
    IdPathParam:
      in: path
      name: id
      required: true
      schema:
        type: integer
        minimum: 1
      description: Resource unique identifier

    PageParam:
      in: query
      name: page
      schema:
        type: integer
        minimum: 1
        default: 1
      description: Page number for pagination

    LimitParam:
      in: query
      name: limit
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 10
      description: Number of items per page

  responses:
    BadRequest:
      description: Invalid request parameters or validation error
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'

    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'

    Conflict:
      description: Business rule conflict or duplicated resource
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'

    InternalServerError:
      description: Internal server error
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'

  schemas:
    ProductStatus:
      type: string
      enum:
        - Draft
        - Active
        - Inactive
        - Archived

    ProductVariantStatus:
      type: string
      enum:
        - Active
        - Inactive
        - OutOfStock
        - Archived

    StockPolicy:
      type: string
      enum:
        - SupplierManaged
        - InternalStock
        - Hybrid

    SupplierStatus:
      type: string
      enum:
        - Active
        - Inactive
        - Blocked

    CustomerOrderStatus:
      type: string
      enum:
        - PendingPayment
        - Paid
        - Processing
        - Completed
        - Cancelled
        - Refunded

    PaymentStatus:
      type: string
      enum:
        - Pending
        - Authorized
        - Paid
        - Failed
        - Refunded
        - PartiallyRefunded

    FulfillmentStatus:
      type: string
      enum:
        - NotStarted
        - PendingSupplierOrder
        - SupplierOrderPlaced
        - PartiallyFulfilled
        - Fulfilled
        - Blocked
        - Cancelled

    SupplierOrderStatus:
      type: string
      enum:
        - Draft
        - Requested
        - Confirmed
        - OutOfStock
        - Shipped
        - Delivered
        - Cancelled

    ShipmentStatus:
      type: string
      enum:
        - Pending
        - Shipped
        - InTransit
        - Delivered
        - Failed
        - Returned

    ReturnRequestStatus:
      type: string
      enum:
        - Requested
        - Approved
        - Rejected
        - Received
        - Refunded
        - Cancelled

    RefundStatus:
      type: string
      enum:
        - Pending
        - Processing
        - Completed
        - Failed
        - Cancelled

    ApiResponse:
      type: object
      properties:
        success:
          type: boolean
        message:
          type: string

    PaginationMeta:
      type: object
      properties:
        page:
          type: integer
          example: 1
        limit:
          type: integer
          example: 10
        total:
          type: integer
          example: 100
        totalPages:
          type: integer
          example: 10

    ErrorResponse:
      type: object
      properties:
        success:
          type: boolean
          example: false
        error:
          type: object
          properties:
            message:
              type: string
              example: Validation failed
            code:
              type: string
              example: VALIDATION_ERROR
            details:
              type: array
              items:
                type: object

    Category:
      type: object
      properties:
        id:
          type: integer
          example: 1
        name:
          type: string
          example: Dresses
        description:
          type: string
          nullable: true
          example: Women's dresses collection
        imageUrl:
          type: string
          nullable: true
          example: https://cdn.example.com/categories/dresses.jpg
        status:
          type: string
          enum: [Active, Inactive]
          example: Active
        parentId:
          type: integer
          nullable: true
          example: null
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    CreateCategoryRequest:
      type: object
      required:
        - name
      properties:
        name:
          type: string
          maxLength: 100
          example: Dresses
        description:
          type: string
          maxLength: 500
          nullable: true
          example: Women's dresses collection
        imageUrl:
          type: string
          nullable: true
          example: https://cdn.example.com/categories/dresses.jpg
        status:
          type: string
          enum: [Active, Inactive]
          default: Active
        parentId:
          type: integer
          nullable: true
          example: null

    UpdateCategoryRequest:
      allOf:
        - $ref: '#/components/schemas/CreateCategoryRequest'

    CategoryResponse:
      type: object
      properties:
        success:
          type: boolean
          example: true
        data:
          $ref: '#/components/schemas/Category'
        message:
          type: string
          example: Operation completed successfully

    CategoryListResponse:
      type: object
      properties:
        success:
          type: boolean
          example: true
        data:
          type: array
          items:
            $ref: '#/components/schemas/Category'
        message:
          type: string
          example: Categories retrieved successfully

    ProductImage:
      type: object
      properties:
        id:
          type: integer
          example: 1
        productId:
          type: integer
          example: 1
        url:
          type: string
          example: https://cdn.example.com/products/black-midi-dress.jpg
        altText:
          type: string
          nullable: true
          example: Black midi dress
        sortOrder:
          type: integer
          example: 0
        createdAt:
          type: string
          format: date-time

    ProductVariant:
      type: object
      description: >
        Represents a sellable variant of a product. Note: supplierId, supplierReference,
        and supplierCost are stored in the database but are NEVER included in API responses.
        These fields are excluded at the Prisma select layer as a security invariant.
      properties:
        id:
          type: integer
          example: 1
        productId:
          type: integer
          example: 1
        sku:
          type: string
          example: DRESS-BLACK-S
        size:
          type: string
          nullable: true
          example: S
        color:
          type: string
          nullable: true
          example: Black
        publicPrice:
          type: number
          format: decimal
          example: 49.99
        compareAtPrice:
          type: number
          format: decimal
          nullable: true
          example: 59.99
        stockPolicy:
          $ref: '#/components/schemas/StockPolicy'
        status:
          $ref: '#/components/schemas/ProductVariantStatus'
        deletedAt:
          type: string
          format: date-time
          nullable: true
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    Product:
      type: object
      properties:
        id:
          type: integer
          example: 1
        name:
          type: string
          example: Black midi dress
        slug:
          type: string
          example: black-midi-dress
        description:
          type: string
          nullable: true
