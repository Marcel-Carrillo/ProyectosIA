name: Deploy to Production

on:
  push:
    branches:
      - master
  workflow_dispatch:

jobs:
  deploy:
    name: Build, migrate, deploy and smoke test
    runs-on: ubuntu-latest
    environment: "CI/CD MiProyectoIA"

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      # ── Backend ────────────────────────────────────────────────────────────────

      - name: Install backend dependencies
        working-directory: backend
        run: npm ci

      - name: Build backend (TypeScript → dist/)
        working-directory: backend
        run: npm run build

      - name: Generate Prisma client
        working-directory: backend
        run: npx prisma generate

      - name: Run database migrations
        working-directory: backend
        run: |
          export DATABASE_URL="${{ secrets.PROD_DATABASE_URL }}"
          npx prisma migrate deploy

      - name: Deploy backend (Serverless Framework)
        working-directory: backend
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        run: npx serverless deploy --stage prod

      # ── Frontend ───────────────────────────────────────────────────────────────

      - name: Set up Node.js for frontend
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci --legacy-peer-deps

      - name: Build frontend (CRA production build)
        working-directory: frontend
        env:
          REACT_APP_API_BASE_URL: ${{ secrets.REACT_APP_API_BASE_URL }}
        run: npm run build

      - name: Sync frontend build to S3
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: eu-north-1
        run: |
          aws s3 sync frontend/build/ s3://${{ secrets.PROD_S3_BUCKET }} --delete

      - name: Invalidate CloudFront cache
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: eu-north-1
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ secrets.PROD_CF_DIST_ID }} \
            --paths "/*"

      # ── Smoke tests ────────────────────────────────────────────────────────────

      - name: Run post-deploy smoke tests
        env:
          PROD_API_BASE_URL: ${{ secrets.PROD_API_BASE_URL }}
        run: |
          bash scripts/smoke.sh "$PROD_API_BASE_URL"
