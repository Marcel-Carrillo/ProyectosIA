service: ecommerce-backend

provider:
  name: aws
  runtime: nodejs20.x
  region: eu-west-1
  environment:
    NODE_ENV: production
    DATABASE_URL: ${env:DATABASE_URL}
    FRONTEND_URL: ${env:FRONTEND_URL}

functions:
  app:
    handler: dist/lambda.handler
    events:
      - http:
          path: /
          method: any
          cors: true
      - http:
          path: /{proxy+}
          method: any
          cors: true

plugins:
  - serverless-offline
