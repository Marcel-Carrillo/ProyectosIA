service: ecommerce-backend

provider:
  name: aws
  runtime: nodejs20.x
  region: eu-north-1
  environment:
    NODE_ENV: production
    DATABASE_URL: ${ssm:/ecommerce/prod/DATABASE_URL}
    FRONTEND_URL: ${ssm:/ecommerce/prod/FRONTEND_URL}
    API_PUBLIC_URL: ${ssm:/ecommerce/prod/API_PUBLIC_URL}
    ADMIN_JWT_SECRET: ${ssm:/ecommerce/prod/ADMIN_JWT_SECRET}
    ADMIN_JWT_EXPIRES_IN: ${ssm:/ecommerce/prod/ADMIN_JWT_EXPIRES_IN}
    CUSTOMER_JWT_SECRET: ${ssm:/ecommerce/prod/CUSTOMER_JWT_SECRET}
    CUSTOMER_JWT_EXPIRES_IN: ${ssm:/ecommerce/prod/CUSTOMER_JWT_EXPIRES_IN}
    COOKIE_SECRET: ${ssm:/ecommerce/prod/COOKIE_SECRET}
    SMTP_HOST: ${ssm:/ecommerce/prod/SMTP_HOST}
    SMTP_PORT: ${ssm:/ecommerce/prod/SMTP_PORT}
    SMTP_SECURE: ${ssm:/ecommerce/prod/SMTP_SECURE}
    SMTP_USER: ${ssm:/ecommerce/prod/SMTP_USER}
    SMTP_PASS: ${ssm:/ecommerce/prod/SMTP_PASS}
    SMTP_FROM: ${ssm:/ecommerce/prod/SMTP_FROM}
    SMTP_STRICT: 'true'
    STRIPE_SECRET_KEY: ${ssm:/ecommerce/prod/STRIPE_SECRET_KEY}
    STRIPE_PUBLISHABLE_KEY: ${ssm:/ecommerce/prod/STRIPE_PUBLISHABLE_KEY}
    STRIPE_WEBHOOK_SECRET: ${ssm:/ecommerce/prod/STRIPE_WEBHOOK_SECRET}
    WELCOME_COUPON_PERCENT: '15'
    WELCOME_COUPON_MIN_ORDER: '0'
    GOOGLE_CLIENT_ID: ${ssm:/ecommerce/prod/GOOGLE_CLIENT_ID, ''}
    GOOGLE_CLIENT_SECRET: ${ssm:/ecommerce/prod/GOOGLE_CLIENT_SECRET, ''}

functions:
  app:
    handler: src/lambda.handler
    events:
      - http:
          path: /
          method: any
          cors:
            origins:
              - 'https://d1p5rkpgizqh62.cloudfront.net'
              - 'https://mavile.es'
              - 'https://www.mavile.es'
            headers:
              - Content-Type
              - Authorization
              - Cookie
              - X-Requested-With
            allowCredentials: true
      - http:
          path: /{proxy+}
          method: any
          cors:
            origins:
              - 'https://d1p5rkpgizqh62.cloudfront.net'
              - 'https://mavile.es'
              - 'https://www.mavile.es'
            headers:
              - Content-Type
              - Authorization
              - Cookie
              - X-Requested-With
            allowCredentials: true

package:
  patterns:
    - '!node_modules/**'
    - 'node_modules/.prisma/client/**'
    - 'node_modules/@prisma/client/**'
    - '!node_modules/.prisma/client/libquery_engine-debian*'
    - '!node_modules/.prisma/client/libquery_engine-linux-musl*'
    - 'src/api-spec.yml'

plugins:
  - serverless-esbuild
  - serverless-offline

custom:
  esbuild:
    bundle: true
    minify: false
    sourcemap: false
    external:
      - '@prisma/client'
      - '.prisma'

